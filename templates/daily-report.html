<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
    }

    .wrapper {
      width: 100%;
      padding: 40px 12px;
      box-sizing: border-box;
      background: #f3f4f6;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
      background: whitesmoke;
      border-radius: 22px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .header {
      padding: 40px 32px 20px;
      text-align: center;
    }

    .repository {
      display: inline-block;
      font-size: 13px;
      font-weight: bold;
      color: #2563eb;
      background: #dbeafe;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 44px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .highlight {
      color: #2563eb;
    }

    .subtitle {
      margin-top: 14px;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.5;
    }

    /* 🔥 IMAGEM OCUPA QUASE TUDO (SEM NECESSIDADE DE CENTRALIZAÇÃO) */
    .image-container {
      padding: 0 16px;
    }

    .featured-image {
      width: 100%;
      max-width: 100%;
      display: block;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
    }

    .content {
      padding: 28px 24px 32px;
      text-align: center;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;

      color: #111827;
      background: transparent;
      border: 1px solid #d1d5db;
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #9ca3af;
    }

    @media only screen and (max-width: 600px) {
      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <div class="container">

      <div class="header">

        <div class="repository">
          luizangelomartins/photos-steam
        </div>

        <!-- 🔥 TÍTULO DO EMAIL / SUBJECT -->
        <h1>
          IMAGEM<br>
          <span class="highlight">DO DIA</span>
        </h1>

        <div class="subtitle">
          Atualização automática gerada pelo GitHub Actions.
        </div>

      </div>

      <div class="image-container">
        <img
          class="featured-image"
          src="https://luizangelomartins.github.io/photos-steam/banner.png"
          alt="Imagem do dia"
        />
      </div>

      <div class="content">

        <a
          class="button"
          href="https://github.com/luizangelomartins/photos-steam"
          target="_blank"
        >
          Abrir repositório
        </a>

        <div class="footer">
          GitHub Actions • IMAGEM DO DIA
        </div>

      </div>

    </div>

  </div>

</body>
</html>
