<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
    }

    /* força centralização em clientes de email */
    .email-wrapper {
      width: 100%;
      background: #f3f4f6;
      padding: 40px 0;
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: whitesmoke;
      border-radius: 24px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    .header {
      padding: 40px 40px 24px;
      text-align: center;
    }

    .repository {
      display: inline-block;
      font-size: 13px;
      font-weight: bold;
      color: #2563eb;
      background: #dbeafe;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1;
      letter-spacing: -2px;
      font-weight: 800;
    }

    .highlight {
      color: #2563eb;
    }

    .subtitle {
      margin-top: 18px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.6;
    }

    .image-container {
      display: flex;
      justify-content: center;
      padding: 0 24px;
    }

    .featured-image {
      width: 85%;
      max-width: 520px;
      display: block;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
    }

    .content {
      padding: 32px;
      text-align: center;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      color: #111827;
      background: transparent;
      border: 1px solid #d1d5db;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9ca3af;
    }

    @media only screen and (max-width: 600px) {
      h1 { font-size: 32px; }
      .featured-image { width: 92%; }
    }
  </style>
</head>

<body>

  <!-- 🔥 TABLE LAYOUT PARA CENTRALIZAÇÃO REAL EM EMAIL -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" class="email-wrapper">
    <tr>
      <td align="center">

        <table role="presentation" class="container" cellspacing="0" cellpadding="0" border="0">

          <tr>
            <td class="header">

              <div class="repository">
                luizangelomartins/photos-steam
              </div>

              <h1>
                IMAGEM<br>
                <span class="highlight">DO DIA</span>
              </h1>

              <div class="subtitle">
                Atualização automática gerada pelo workflow.
              </div>

            </td>
          </tr>

          <tr>
            <td class="image-container" align="center">
              <img
                class="featured-image"
                src="https://luizangelomartins.github.io/photos-steam/banner.png"
                alt="Imagem do dia"
              />
            </td>
          </tr>

          <tr>
            <td class="content">

              <a
                class="button"
                href="https://github.com/luizangelomartins/photos-steam"
                target="_blank"
              >
                Abrir repositório
              </a>

              <div class="footer">
                GitHub Actions • Atualização automática
              </div>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
